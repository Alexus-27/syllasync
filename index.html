<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Server Monitoring Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(20, 27, 45, 0.6);
            --card-border: rgba(255, 255, 255, 0.05);
            --accent-primary: #00f2fe;
            --accent-secondary: #4facfe;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(79, 172, 254, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 242, 254, 0.15), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--card-border);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--accent-secondary), var(--accent-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-weight: 500;
            font-size: 0.9rem;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2), 0 4px 6px -2px rgba(0, 0, 0, 0.1);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .card-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .card-subtext {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .trend-up { color: var(--danger); }
        .trend-down { color: var(--success); }

        .chart-container {
            grid-column: 1 / -1;
            height: 300px;
            position: relative;
        }
        
        .chart-wrapper {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .progress-bar-bg {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 1rem;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-secondary), var(--accent-primary));
            border-radius: 3px;
            transition: width 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>ServerNexus Dashboard</h1>
            <div class="status-badge">
                <div class="status-dot"></div>
                System Online
            </div>
        </header>

        <div class="grid">
            <div class="card">
                <div class="card-header">
                    <span>CPU Usage</span>
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
                </div>
                <div class="card-value" id="cpu-value">24%</div>
                <div class="card-subtext"><span class="trend-down">↓ 2%</span> from last min</div>
                <div class="progress-bar-bg">
                    <div class="progress-bar" id="cpu-bar" style="width: 24%"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span>Memory Usage</span>
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                </div>
                <div class="card-value" id="mem-value">4.2 GB</div>
                <div class="card-subtext">52% of 8.0 GB total</div>
                <div class="progress-bar-bg">
                    <div class="progress-bar" id="mem-bar" style="width: 52%"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span>Network Traffic</span>
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <div class="card-value" id="net-value">1.2 MB/s</div>
                <div class="card-subtext"><span class="trend-up">↑ 0.4 MB/s</span> from last min</div>
            </div>

            <div class="card">
                <div class="card-header">
                    <span>Active Connections</span>
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                </div>
                <div class="card-value" id="conn-value">842</div>
                <div class="card-subtext">Across 4 regions</div>
            </div>
        </div>

        <div class="chart-wrapper">
            <div class="card-header">System Load Realtime (Last 60s)</div>
            <div class="chart-container">
                <canvas id="networkChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // Chart Initialization
        const ctx = document.getElementById('networkChart').getContext('2d');
        
        // Gradient for chart area
        const gradient = ctx.createLinearGradient(0, 0, 0, 400);
        gradient.addColorStop(0, 'rgba(0, 242, 254, 0.5)');
        gradient.addColorStop(1, 'rgba(0, 242, 254, 0.0)');

        const initialData = Array.from({length: 20}, () => Math.floor(Math.random() * 40) + 20);

        const config = {
            type: 'line',
            data: {
                labels: Array.from({length: 20}, (_, i) => `-${20 - i}s`),
                datasets: [{
                    label: 'CPU Load (%)',
                    data: initialData,
                    borderColor: '#00f2fe',
                    backgroundColor: gradient,
                    borderWidth: 2,
                    tension: 0.4,
                    fill: true,
                    pointBackgroundColor: '#0b0f19',
                    pointBorderColor: '#00f2fe',
                    pointBorderWidth: 2,
                    pointRadius: 3,
                    pointHoverRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100,
                        grid: { color: 'rgba(255, 255, 255, 0.05)' },
                        ticks: { color: '#94a3b8' }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: '#94a3b8' }
                    }
                },
                animation: { duration: 400 }
            }
        };

        const networkChart = new Chart(ctx, config);

        // Realtime Data Simulation Update
        setInterval(() => {
            // Update CPU
            const newCpu = Math.floor(Math.random() * 30) + 15;
            document.getElementById('cpu-value').innerText = `${newCpu}%`;
            document.getElementById('cpu-bar').style.width = `${newCpu}%`;

            // Update Chart
            const data = networkChart.data.datasets[0].data;
            data.shift();
            data.push(newCpu);
            networkChart.update();

            // Update Mem
            const memBase = 4.0;
            const newMem = (memBase + (Math.random() * 0.5)).toFixed(1);
            const memPercent = Math.round((newMem / 8.0) * 100);
            document.getElementById('mem-value').innerText = `${newMem} GB`;
            document.getElementById('mem-bar').style.width = `${memPercent}%`;

            // Update Net
            const newNet = (Math.random() * 3).toFixed(1);
            document.getElementById('net-value').innerText = `${newNet} MB/s`;

            // Update Conn
            const currentConn = parseInt(document.getElementById('conn-value').innerText);
            const diff = Math.floor(Math.random() * 20) - 10;
            document.getElementById('conn-value').innerText = currentConn + diff;

        }, 2000);
    </script>
</body>
</html>
